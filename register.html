<!DOCTYPE html>
<html>
<head>
<title>Register</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
/* SIDEBAR */
.sidebar {
  position: fixed;
  left: 0;
  top: 0;
  width: 220px;
  height: 100%;
  background: #111;
  padding: 40px 20px;
}

.sidebar .logo {
  color: #f4f1ea;
  margin-bottom: 40px;
}

.sidebar a {
  display: block;
  color: #f4f1ea;
  margin: 15px 0;
  text-decoration: none;
  position: relative;
  transition: 0.3s;
}

.sidebar a::after {
  content: "";
  position: absolute;
  width: 0%;
  height: 1px;
  bottom: -3px;
  left: 0;
  background: #c2a47e;
  transition: 0.3s;
}

.sidebar a:hover::after {
  width: 100%;
}

body {
  margin-left: 240px;
}

.sidebar a.active {
  color: #c2a47e;
  font-weight: bold;
}

#toggleBtn {
  position: fixed;
  top: 20px;
  left: 20px;
  z-index: 2000;
  background: #111;
  color: white;
  border: none;
  padding: 10px;
  cursor: pointer;
}

.sidebar.collapsed {
  width: 70px;
}

.sidebar.collapsed a {
  font-size: 0;
}

.sidebar.collapsed a i {
  font-size: 18px;
}

.sidebar.collapsed .logo {
  font-size: 12px;
}
</style>
</head>
<body style="text-align:center; background:#f5f5f0;">
<button id="toggleBtn">☰</button>
<nav>
  <div class="sidebar">
  <h2 class="logo">SXCJ</h2>

  <a href="index.html"><i class="fas fa-home"></i> Home</a>
  <a href="about.html"><i class="fas fa-info-circle"></i> About</a>
  <a href="committees.html"><i class="fas fa-users"></i> Committees</a>
  <a href="secretariat.html"><i class="fas fa-user-tie"></i> Secretariat</a>
  <a href="register.html" class="active"><i class="fas fa-pen"></i> Register</a>
  <a href="contact.html"><i class="fas fa-envelope"></i> Contact</a>
</div>
</nav>

<h1>Registrations</h1>
<p>Opening Soon</p>

<script>
const btn = document.getElementById("toggleBtn");
const sidebar = document.querySelector(".sidebar");

btn.addEventListener("click", () => {
  sidebar.classList.toggle("collapsed");
});
</script>
</body>
</html>
