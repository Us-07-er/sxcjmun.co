<!DOCTYPE html> 
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>

/* BASE */
body {
  margin:0;
  font-family: 'Georgia', serif;
  background: linear-gradient(180deg, #f4f1ea, #ebe7de);
  color:#111;
  text-align:center;
}

/* SIDEBAR (FIXED CLEAN VERSION) */
.sidebar {
  position: fixed;
  top: 0;
  left: 0;
  width: 220px;
  height: 100%;
  background: #111;
  padding: 40px 20px;

  transform: translateX(-100%);
  transition: 0.3s ease;
  z-index: 1000;
}

.sidebar.active {
  transform: translateX(0);
}

.sidebar .logo {
  color: #f4f1ea;
  margin-bottom: 40px;
}

.sidebar a {
  display: block;
  color: #f4f1ea;
  margin: 15px 0;
  text-decoration: none;
  transition: 0.3s;
  font-size: 14px;

  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.sidebar a:hover {
  transform: translateX(5px);
  opacity: 1;
}

.sidebar a {
  opacity: 0.8;
}

.sidebar a.active {
  color:#c2a47e;
  font-weight:bold;
}

/* BUTTON */
#toggleBtn {
  position: fixed;
  top: 20px;
  left: 20px;
  z-index: 2000;
  background: #111;
  color: white;
  border: none;
  padding: 10px;
  cursor: pointer;
}

/* PAGE STYLE */
h1 {
  font-size: 48px;
  margin-top: 80px;
}

p {
  font-size: 18px;
  margin: 10px 0;
}

/* MOBILE FIX */
@media (max-width:768px){
  h1 {
    font-size: 32px;
  }
}

</style>
</head>

<body>

<button id="toggleBtn">☰</button>

<div class="sidebar">
  <h2 class="logo">SXCJ</h2>

  <a href="index.html"><i class="fas fa-home"></i> Home</a>
  <a href="about.html"><i class="fas fa-info-circle"></i> About</a>
  <a href="committees.html"><i class="fas fa-users"></i> Committees</a>
  <a href="secretariat.html"><i class="fas fa-user-tie"></i> Secretariat</a>
  <a href="register.html"><i class="fas fa-pen"></i> Register</a>
  <a href="contact.html" class="active"><i class="fas fa-envelope"></i> Contact</a>
</div>

<h1>Contact Us</h1>

<p>Email: ________</p>
<p>Instagram: ________</p>
<p>Phone: ________</p>

<script>
function toggleSidebar() {
  document.querySelector(".sidebar").classList.toggle("active");
}

document.getElementById("toggleBtn").addEventListener("click", toggleSidebar);
</script>

</body>
</html>
